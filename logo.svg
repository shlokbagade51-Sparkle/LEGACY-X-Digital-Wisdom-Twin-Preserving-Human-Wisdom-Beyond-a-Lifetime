<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="brainGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="95" r="72" fill="url(#glowGrad)"/>

  <!-- Tree trunk -->
  <rect x="93" y="128" width="14" height="38" rx="5" fill="#6366f1" filter="url(#softGlow)"/>

  <!-- Tree roots -->
  <path d="M100 165 Q84 172 72 168" stroke="#6366f1" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M100 165 Q116 172 128 168" stroke="#6366f1" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M100 162 Q95 174 90 178" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M100 162 Q105 174 110 178" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Tree canopy / brain -->
  <ellipse cx="100" cy="85" rx="52" ry="58" fill="url(#brainGrad)" filter="url(#glow)"/>

  <!-- Brain hemisphere line -->
  <line x1="100" y1="32" x2="100" y2="130" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Brain fold lines -->
  <path d="M60 70 Q68 58 76 66 Q82 50 90 62 Q96 44 100 56 Q104 44 110 58 Q118 50 124 62 Q132 58 140 70"
        stroke="white" stroke-width="2.5" fill="none" opacity="0.65" stroke-linecap="round"/>
  <path d="M56 84 Q68 94 78 86 Q86 96 94 88 Q100 98 106 88 Q114 96 122 86 Q132 94 144 84"
        stroke="white" stroke-width="2.5" fill="none" opacity="0.65" stroke-linecap="round"/>
  <path d="M62 102 Q74 112 84 104 Q92 112 100 106 Q108 112 116 104 Q126 112 138 102"
        stroke="white" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- Glowing synapses -->
  <circle cx="100" cy="22" r="6" fill="#c4b5fd" filter="url(#glow)"/>
  <circle cx="70"  cy="40" r="4" fill="#818cf8" filter="url(#softGlow)" opacity="0.8"/>
  <circle cx="130" cy="40" r="4" fill="#818cf8" filter="url(#softGlow)" opacity="0.8"/>
  <circle cx="56"  cy="65" r="3" fill="#60a5fa" filter="url(#softGlow)" opacity="0.6"/>
  <circle cx="144" cy="65" r="3" fill="#60a5fa" filter="url(#softGlow)" opacity="0.6"/>
</svg>
